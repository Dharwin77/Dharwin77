<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 340" width="830" height="340">
  <defs>
    <!-- Dark Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02050e" />
      <stop offset="50%" stop-color="#050a18" />
      <stop offset="100%" stop-color="#020307" />
    </linearGradient>

    <!-- Liquid Fluid Auroras -->
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>

    <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&amp;family=Fira+Code:wght@400;500&amp;display=swap');

    /* Fluid Morphing Animations */
    .blob1 {
      animation: morphBlob1 18s ease-in-out infinite alternate;
    }
    .blob2 {
      animation: morphBlob2 15s ease-in-out infinite alternate;
    }

    @keyframes morphBlob1 {
      0% { d: path("M 600,100 C 680,80 780,120 780,180 C 780,240 690,280 620,260 C 550,240 520,180 540,130 C 560,80 520,120 600,100 Z"); }
      50% { d: path("M 620,80 C 710,60 740,150 760,200 C 780,250 660,290 600,270 C 540,250 510,210 515,160 C 520,110 530,100 620,80 Z"); }
      100% { d: path("M 580,110 C 660,90 750,110 770,170 C 790,230 710,250 640,270 C 570,290 530,230 535,180 C 540,130 500,130 580,110 Z"); }
    }

    @keyframes morphBlob2 {
      0% { d: path("M 680,130 C 740,90 810,140 790,200 C 770,260 700,280 650,260 C 600,240 580,200 600,150 C 620,100 620,170 680,130 Z"); }
      50% { d: path("M 650,110 C 720,100 790,120 810,180 C 830,240 720,270 660,250 C 600,230 570,180 590,130 C 610,80 580,120 650,110 Z"); }
      100% { d: path("M 680,130 C 740,90 810,140 790,200 C 770,260 700,280 650,260 C 600,240 580,200 600,150 C 620,100 620,170 680,130 Z"); }
    }

    /* Editorial Typography */
    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 56px;
      line-height: 1;
      fill: #ffffff;
      letter-spacing: -2px;
    }
    .brand-outline {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 56px;
      fill: none;
      stroke: rgba(255,255,255,0.15);
      stroke-width: 1.5px;
      letter-spacing: -2px;
    }
    
    .brand-tag {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #00f2fe;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .brand-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 400;
      fill: #94a3b8;
      letter-spacing: 0.5px;
    }

    .info-label {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      fill: #64748b;
    }
    .info-val {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      fill: #cbd5e1;
    }

    /* Audio Equalizer Widget */
    .eq-bar {
      width: 3px;
      fill: #00f2fe;
      transform-origin: bottom;
    }
    @keyframes eq1 { 0%, 100% { transform: scaleY(0.2); } 50% { transform: scaleY(0.85); } }
    @keyframes eq2 { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(0.95); } }
    @keyframes eq3 { 0%, 100% { transform: scaleY(0.15); } 50% { transform: scaleY(0.7); } }
    @keyframes eq4 { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(0.9); } }

    /* Sine Wave Field Animations */
    .wave-line {
      fill: none;
      stroke-width: 1.5px;
      stroke-linecap: round;
      animation: waveFlow 12s linear infinite;
    }
    @keyframes waveFlow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -360; }
    }
  </style>

  <!-- Background -->
  <rect width="830" height="340" fill="url(#bgGrad)" />

  <!-- Ambient Organic Shifting Background Aurora (Right Side) -->
  <g filter="url(#blurFilter)" opacity="0.6">
    <path class="blob1" d="M 600,100 C 680,80 780,120 780,180 C 780,240 690,280 620,260 C 550,240 520,180 540,130 C 560,80 520,120 600,100 Z" fill="url(#aurora1)" />
    <path class="blob2" d="M 680,130 C 740,90 810,140 790,200 C 770,260 700,280 650,260 C 600,240 580,200 600,150 C 620,100 620,170 680,130 Z" fill="url(#aurora2)" />
  </g>

  <!-- Left Side: Editorial Typography Layout -->
  <g transform="translate(60, 60)">
    <!-- Tech Tag -->
    <text class="brand-tag" x="0" y="0">✦ AI ENGINEER &amp; WEB ARCHITECT</text>
    
    <!-- Big Editorial Name Title -->
    <text class="brand-name" x="0" y="55">DHARWIN S.</text>
    <text class="brand-outline" x="0" y="105">PORTFOLIO</text>

    <!-- Bio Statement -->
    <text class="brand-sub" x="0" y="140">Developing systems at the intersection of intelligence and interfaces.</text>

    <!-- Parameters Grid -->
    <g transform="translate(0, 170)">
      <!-- Parameter 1 -->
      <g transform="translate(0, 0)">
        <text class="info-label" x="0" y="0">INSTITUTION</text>
        <text class="info-val" x="0" y="18">Kongu Engineering College</text>
      </g>
      <!-- Parameter 2 -->
      <g transform="translate(200, 0)">
        <text class="info-label" x="0" y="0">DEGREE / BATCH</text>
        <text class="info-val" x="0" y="18">B.Tech AIDS // 2023 - 2027</text>
      </g>
      <!-- Parameter 3 -->
      <g transform="translate(0, 45)">
        <text class="info-label" x="0" y="0">GPA RATING</text>
        <text class="info-val" x="0" y="18">8.11 / 10.0 CGPA</text>
      </g>
      <!-- Parameter 4 -->
      <g transform="translate(200, 45)">
        <text class="info-label" x="0" y="0">CURRENT STATUS</text>
        <text class="info-val" x="0" y="18" fill="#10b981">● ACTIVE &amp; BUILDING</text>
      </g>
    </g>
  </g>

  <!-- Right Side: 3D College Student Studying & Waving Hello -->
  <g transform="translate(480, 0)">
    <!-- Clean Glass Screen frame -->
    <rect x="30" y="50" width="260" height="240" rx="16" fill="#070b15" fill-opacity="0.4" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    
    <!-- Fine HUD Scope Grid overlay behind the avatar -->
    <g stroke="rgba(255,255,255,0.02)" stroke-width="0.75">
      <line x1="30" y1="170" x2="290" y2="170" />
      <line x1="160" y1="50" x2="160" y2="290" />
      <circle cx="160" cy="170" r="100" fill="none" stroke-dasharray="3,6" />
    </g>

    <!-- Glowing technical frame overlays -->
    <path d="M 40,65 L 50,65 M 40,65 L 40,75" stroke="#00f2fe" stroke-width="1.5" fill="none" opacity="0.8" />
    <path d="M 280,65 L 270,65 M 280,65 L 280,75" stroke="#00f2fe" stroke-width="1.5" fill="none" opacity="0.8" />
    <path d="M 40,275 L 50,275 M 40,275 L 40,265" stroke="#00f2fe" stroke-width="1.5" fill="none" opacity="0.8" />
    <path d="M 280,275 L 270,275 M 280,275 L 280,265" stroke="#00f2fe" stroke-width="1.5" fill="none" opacity="0.8" />

    <!-- 3D Student Avatar Image -->
    <image href="./student.png" x="35" y="55" width="250" height="230" style="mix-blend-mode: screen;" />

    <!-- HUD text labels -->
    <text font-family="'Fira Code', monospace" font-size="8.5" fill="#00f2fe" x="45" y="75">[ MODE: STUDYING ]</text>
    <text font-family="'Fira Code', monospace" font-size="8.5" fill="#f59e0b" x="195" y="75">LIVE: HI! 👋</text>
  </g>

  <!-- Bottom Left: "Now Playing" Lofi Audio Widget -->
  <g transform="translate(60, 290)">
    <rect x="-10" y="-12" width="220" height="26" rx="6" fill="#070c18" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    
    <!-- Equalizer Bars (Animated via CSS scaleY) -->
    <g transform="translate(0, 4)">
      <rect class="eq-bar" x="0" y="-12" height="12" style="animation: eq1 1.2s ease-in-out infinite;"/>
      <rect class="eq-bar" x="5" y="-12" height="12" style="animation: eq2 0.8s ease-in-out infinite;"/>
      <rect class="eq-bar" x="10" y="-12" height="12" style="animation: eq3 1.5s ease-in-out infinite;"/>
      <rect class="eq-bar" x="15" y="-12" height="12" style="animation: eq4 1.0s ease-in-out infinite;"/>
    </g>

    <!-- Track Info -->
    <text font-family="'Fira Code', monospace" font-size="9.5" fill="#475569" x="28" y="0">NOW PLAYING:</text>
    <text font-family="'Outfit', sans-serif" font-weight="600" font-size="10.5" fill="#e2e8f0" x="105" y="0">Lofi Coding Session</text>
  </g>

  <!-- Outer Editorial Borders (Clean and Thin) -->
  <rect x="15" y="15" width="800" height="310" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <circle cx="15" cy="15" r="2.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="815" cy="15" r="2.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="15" cy="325" r="2.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="815" cy="325" r="2.5" fill="rgba(255,255,255,0.1)"/>
</svg>
