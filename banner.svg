<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 340" width="830" height="340">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030305" />
      <stop offset="50%" stop-color="#08080d" />
      <stop offset="100%" stop-color="#020204" />
    </linearGradient>

    <!-- Neon Accents -->
    <linearGradient id="cyberPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#ff50a0" />
    </linearGradient>
    <linearGradient id="neonLime" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1ff24" />
      <stop offset="100%" stop-color="#bfff00" />
    </linearGradient>

    <!-- Glass border gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#d1ff24" stop-opacity="0.6" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="ambientBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&amp;family=Fira+Code:wght@400;600&amp;display=swap');

    /* Background auroras */
    .aurora-pink {
      animation: pulsePink 12s ease-in-out infinite alternate;
    }
    .aurora-lime {
      animation: pulseLime 15s ease-in-out infinite alternate;
    }
    @keyframes pulsePink {
      0% { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(50px, -30px) scale(1.2); }
    }
    @keyframes pulseLime {
      0% { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(-40px, 40px) scale(1.1); }
    }

    /* 3D Generative Orbits */
    .orbit-group-1 {
      transform-origin: 640px 170px;
      animation: spin3D1 24s linear infinite;
    }
    @keyframes spin3D1 {
      from { transform: rotateX(60deg) rotateY(25deg) rotateZ(0deg); }
      to { transform: rotateX(60deg) rotateY(25deg) rotateZ(360deg); }
    }

    .orbit-group-2 {
      transform-origin: 640px 170px;
      animation: spin3D2 18s linear infinite reverse;
    }
    @keyframes spin3D2 {
      from { transform: rotateX(55deg) rotateY(-30deg) rotateZ(0deg); }
      to { transform: rotateX(55deg) rotateY(-30deg) rotateZ(360deg); }
    }

    .orbit-group-3 {
      transform-origin: 640px 170px;
      animation: spin3D3 30s linear infinite;
    }
    @keyframes spin3D3 {
      from { transform: rotateX(45deg) rotateY(45deg) rotateZ(0deg); }
      to { transform: rotateX(45deg) rotateY(45deg) rotateZ(360deg); }
    }

    /* Math Symbol Rotation - keeps them upright while rotating */
    .symbol-text {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #ffffff;
      opacity: 0.85;
      animation: counterRotate 24s linear infinite;
      transform-origin: center;
    }
    @keyframes counterRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    /* Core Typography */
    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 58px;
      fill: #ffffff;
      letter-spacing: -2px;
    }
    .brand-glow {
      fill: #ff0055;
      filter: url(#neonGlow);
      opacity: 0.5;
    }
    
    .brand-subtitle {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #d1ff24;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .brand-desc {
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px;
      font-weight: 400;
      fill: #8a8a93;
      letter-spacing: 0.5px;
    }

    /* Tech Pill Badges */
    .pill-bg {
      fill: #0c0c14;
      stroke: #1c1c28;
      stroke-width: 1px;
      rx: 12px;
    }
    .pill-text {
      font-family: 'Fira Code', monospace;
      font-size: 9.5px;
      font-weight: 600;
      fill: #ff0055;
    }

    /* Cyberwave Brainwave Line */
    .brainwave {
      fill: none;
      stroke: url(#cyberPink);
      stroke-width: 1.5px;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: waveFlow 4s linear infinite;
    }
    @keyframes waveFlow {
      0% { stroke-dasharray: 200; stroke-dashoffset: 400; }
      100% { stroke-dasharray: 200; stroke-dashoffset: 0; }
    }
  </style>

  <!-- Background Canvas -->
  <rect width="830" height="340" fill="url(#bgGrad)" />

  <!-- Ambient Organic Color auroras (Shifting background) -->
  <g filter="url(#ambientBlur)" opacity="0.25">
    <circle class="aurora-pink" cx="600" cy="120" r="100" fill="#ff0055" />
    <circle class="aurora-lime" cx="680" cy="220" r="80" fill="#d1ff24" />
  </g>

  <!-- Left Side: Editorial Typography & Tech Specs -->
  <g transform="translate(60, 60)">
    <!-- Header Indicator -->
    <text class="brand-subtitle" x="0" y="0">▲ NEURAL INTERFACES &amp; FULL STACK</text>
    
    <!-- Big Glowing Name -->
    <g transform="translate(0, 52)">
      <text class="brand-title brand-glow" x="0" y="0">Dharwin S.</text>
      <text class="brand-title" x="0" y="0">Dharwin S.</text>
    </g>

    <!-- Bio Description -->
    <text class="brand-desc" x="0" y="90">Architecting mathematical models and high-performance compilation layers.</text>

    <!-- Horizontal line divider -->
    <line x1="0" y1="110" x2="380" y2="110" stroke="#1c1c28" stroke-width="1.5" />

    <!-- Details Grid -->
    <g transform="translate(0, 135)" font-family="'Outfit', sans-serif">
      <!-- Detail 1 -->
      <text font-size="10" font-family="'Fira Code', monospace" fill="#505058" x="0" y="0">SYS.ORIGIN</text>
      <text font-size="13" font-weight="600" fill="#ffffff" x="0" y="18">Kongu Eng College</text>
      
      <!-- Detail 2 -->
      <text font-size="10" font-family="'Fira Code', monospace" fill="#505058" x="200" y="0">GPA.INDEX</text>
      <text font-size="13" font-weight="600" fill="#d1ff24" x="200" y="18">8.11 / 10.00 CGPA</text>
      
      <!-- Detail 3 -->
      <text font-size="10" font-family="'Fira Code', monospace" fill="#505058" x="0" y="45">CORE.FOCUS</text>
      <text font-size="13" font-weight="600" fill="#ffffff" x="0" y="63">AI &amp; Data Science</text>
      
      <!-- Detail 4 -->
      <text font-size="10" font-family="'Fira Code', monospace" fill="#505058" x="200" y="45">SYS.STATUS</text>
      <text font-size="13" font-weight="600" fill="#ff0055" x="200" y="63">Ready to Build</text>
    </g>

    <!-- Modern Pill Tags -->
    <g transform="translate(0, 225)">
      <g transform="translate(0, 0)">
        <rect class="pill-bg" x="0" y="0" width="85" height="22" />
        <text class="pill-text" x="12" y="14">LLM.AGENT</text>
      </g>
      <g transform="translate(95, 0)">
        <rect class="pill-bg" x="0" y="0" width="100" height="22" />
        <text class="pill-text" fill="#d1ff24" x="14" y="14">DEEP.LEARN</text>
      </g>
      <g transform="translate(205, 0)">
        <rect class="pill-bg" x="0" y="0" width="90" height="22" />
        <text class="pill-text" fill="#ffffff" x="12" y="14">COMPILER.JS</text>
      </g>
    </g>
  </g>

  <!-- Right Side: Generative Mathematical Orbit Sphere -->
  <!-- Central Glowing AI Core -->
  <g transform="translate(640, 170)">
    <!-- Main Center Core Sphere -->
    <circle cx="0" cy="0" r="16" fill="url(#cyberPink)" filter="url(#neonGlow)" />
    <circle cx="0" cy="0" r="8" fill="#ffffff" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#d1ff24" stroke-width="1.5" opacity="0.3" stroke-dasharray="2,6" />
  </g>

  <!-- Orbit 1: Cyber Pink (Outer tilted) -->
  <g class="orbit-group-1">
    <ellipse cx="640" cy="170" rx="110" ry="40" fill="none" stroke="url(#cyberPink)" stroke-width="1.5" opacity="0.6" />
    
    <!-- Floating Symbols on Path -->
    <g transform="translate(530, 170)">
      <circle cx="0" cy="0" r="3.5" fill="#ffffff" filter="url(#neonGlow)" />
    </g>
    <!-- Math symbol node -->
    <g transform="translate(750, 170)">
      <circle cx="0" cy="0" r="11" fill="#08080d" stroke="#ff0055" stroke-width="1" />
      <text class="symbol-text" x="-5" y="4">∑</text>
    </g>
  </g>

  <!-- Orbit 2: Neon Lime (Middle tilted opposite) -->
  <g class="orbit-group-2">
    <ellipse cx="640" cy="170" rx="85" ry="32" fill="none" stroke="url(#neonLime)" stroke-width="1.5" opacity="0.7" />
    
    <g transform="translate(555, 170)">
      <circle cx="0" cy="0" r="3" fill="#d1ff24" filter="url(#neonGlow)" />
    </g>
    <!-- Code symbol node -->
    <g transform="translate(725, 170)">
      <circle cx="0" cy="0" r="11" fill="#08080d" stroke="#d1ff24" stroke-width="1" />
      <text class="symbol-text" x="-5" y="4">{ }</text>
    </g>
  </g>

  <!-- Orbit 3: White/Gray (Vertical/Tilted) -->
  <g class="orbit-group-3">
    <ellipse cx="640" cy="170" rx="130" ry="46" fill="none" stroke="#8a8a93" stroke-width="0.75" stroke-dasharray="5,15" opacity="0.4" />
    
    <!-- Floating Math symbol lambda -->
    <g transform="translate(770, 170)">
      <circle cx="0" cy="0" r="11" fill="#08080d" stroke="#8a8a93" stroke-width="1" />
      <text class="symbol-text" x="-4" y="4">λ</text>
    </g>
    <!-- Floating Math symbol partial derivative -->
    <g transform="translate(510, 170)">
      <circle cx="0" cy="0" r="11" fill="#08080d" stroke="#8a8a93" stroke-width="1" />
      <text class="symbol-text" x="-4" y="4">∂</text>
    </g>
  </g>

  <!-- Bottom Left: Cyberwave Oscilloscope Graph (Technical) -->
  <g transform="translate(60, 305)" opacity="0.6">
    <path class="brainwave" d="M 0,10 L 15,10 Q 25,10 30,0 T 40,20 T 50,10 L 70,10 Q 80,10 85,-5 T 95,25 T 105,10 L 140,10 T 150,0 T 160,20 T 170,10 L 220,10" />
    <text font-family="'Fira Code', monospace" font-size="9" fill="#505058" x="230" y="13">NEURAL.OSC</text>
  </g>

  <!-- Clean Border Frames -->
  <rect x="15" y="15" width="800" height="310" fill="none" stroke="url(#glassBorder)" stroke-width="1.2" opacity="0.75" />
  <circle cx="15" cy="15" r="2" fill="#ff0055"/>
  <circle cx="815" cy="15" r="2" fill="#d1ff24"/>
  <circle cx="15" cy="325" r="2" fill="#d1ff24"/>
  <circle cx="815" cy="325" r="2" fill="#ff0055"/>
</svg>
