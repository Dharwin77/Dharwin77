<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 300" width="830" height="300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814" />
      <stop offset="50%" stop-color="#0b132b" />
      <stop offset="100%" stop-color="#1c2541" />
    </linearGradient>
    
    <!-- Text Glow Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&amp;family=Fira+Code:wght@400;500&amp;display=swap');
    
    .title {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 54px;
      font-weight: 800;
      fill: url(#textGrad);
      filter: drop-shadow(0px 0px 12px rgba(0, 242, 254, 0.5));
    }
    
    .subtitle {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      font-weight: 400;
      fill: #94a3b8;
      letter-spacing: 3px;
    }

    .role-badge {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #00f2fe;
      font-weight: 500;
    }

    .badge-bg {
      fill: #0b152d;
      stroke: #1e293b;
      stroke-width: 1.5px;
      rx: 6px;
    }
    
    /* Animations */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(0.95); }
      50% { opacity: 0.9; transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(0.95); }
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .floating-group {
      animation: float 6s ease-in-out infinite;
    }

    .pulsing-node {
      animation: pulse 3s ease-in-out infinite;
      transform-origin: center;
    }

    .rotating-orbit {
      transform-origin: 640px 150px;
      animation: rotate 25s linear infinite;
    }
    
    .rotating-orbit-reverse {
      transform-origin: 640px 150px;
      animation: rotate 18s linear infinite reverse;
    }
  </style>

  <!-- Background -->
  <rect width="830" height="300" fill="url(#bgGrad)" />

  <!-- Grid lines overlay for tech vibe -->
  <g opacity="0.05">
    <path d="M 0,50 L 830,50 M 0,100 L 830,100 M 0,150 L 830,150 M 0,200 L 830,200 M 0,250 L 830,250" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300 M 800,0 L 800,300" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Animated Neural/Data Grid Background on the right -->
  <g class="floating-group">
    <!-- Glowing background orbits -->
    <circle cx="640" cy="150" r="100" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="6,12" opacity="0.25" class="rotating-orbit" />
    <circle cx="640" cy="150" r="75" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="12,6" opacity="0.2" class="rotating-orbit-reverse" />
    <circle cx="640" cy="150" r="120" fill="none" stroke="#00f2fe" stroke-width="0.5" stroke-dasharray="4,20" opacity="0.15" class="rotating-orbit" />
    
    <!-- Central Node -->
    <circle cx="640" cy="150" r="28" fill="#050814" stroke="url(#accentGrad)" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- Outer Nodes & Connecting Lines -->
    <!-- Node 1: Top Left -->
    <line x1="640" y1="150" x2="550" y2="90" stroke="#00f2fe" stroke-width="1.5" opacity="0.4" />
    <circle cx="550" cy="90" r="7" fill="#00f2fe" filter="url(#glow)" />
    <circle cx="550" cy="90" r="12" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.5" class="pulsing-node" style="animation-delay: 0s;" />

    <!-- Node 2: Top Right -->
    <line x1="640" y1="150" x2="720" y2="80" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4" />
    <circle cx="720" cy="80" r="6" fill="#8b5cf6" filter="url(#glow)" />
    <circle cx="720" cy="80" r="10" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5" class="pulsing-node" style="animation-delay: 0.7s;" />

    <!-- Node 3: Bottom Right -->
    <line x1="640" y1="150" x2="730" y2="210" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" />
    <circle cx="730" cy="210" r="8" fill="#3b82f6" filter="url(#glow)" />
    <circle cx="730" cy="210" r="14" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5" class="pulsing-node" style="animation-delay: 1.4s;" />

    <!-- Node 4: Bottom Left -->
    <line x1="640" y1="150" x2="560" y2="210" stroke="#10b981" stroke-width="1.5" opacity="0.4" />
    <circle cx="560" cy="210" r="5" fill="#10b981" filter="url(#glow)" />
    <circle cx="560" cy="210" r="9" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5" class="pulsing-node" style="animation-delay: 2.1s;" />

    <!-- Node 5: Top Center -->
    <line x1="640" y1="150" x2="630" y2="50" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" />
    <circle cx="630" cy="50" r="5" fill="#f59e0b" filter="url(#glow)" />
    <circle cx="630" cy="50" r="9" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5" class="pulsing-node" style="animation-delay: 1s;" />

    <!-- Inter-node mesh connections -->
    <polygon points="550,90 630,50 640,150" fill="url(#accentGrad)" opacity="0.04" />
    <polygon points="720,80 730,210 640,150" fill="url(#accentGrad)" opacity="0.04" />
    <polygon points="560,210 640,150 730,210" fill="url(#accentGrad)" opacity="0.04" />
  </g>

  <!-- Left Side Content -->
  <!-- Status Badge -->
  <g transform="translate(60, 50)">
    <rect class="badge-bg" x="0" y="0" width="136" height="26" />
    <circle cx="16" cy="13" r="4.5" fill="#10b981" />
    <!-- Pulse ring for the green dot -->
    <circle cx="16" cy="13" r="7.5" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="4.5;9;4.5" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
    </circle>
    <text class="role-badge" x="29" y="17">READY TO BUILD</text>
  </g>

  <!-- Name -->
  <text class="title" x="60" y="130">Dharwin S</text>

  <!-- Subtitle -->
  <text class="subtitle" x="60" y="168">AI &amp; DATA SCIENCE Student | FULL STACK DEVELOPER</text>

  <!-- Separator Line with glowing gradient -->
  <rect x="60" y="188" width="380" height="2" fill="url(#accentGrad)" opacity="0.8" />

  <!-- Badges Grid -->
  <g transform="translate(60, 208)">
    <!-- Badge 1: AI/ML -->
    <g transform="translate(0, 0)">
      <rect class="badge-bg" x="0" y="0" width="70" height="26" />
      <text font-family="'Fira Code', monospace" font-size="11" font-weight="500" fill="#00f2fe" x="15" y="17">AI/ML</text>
    </g>
    <!-- Badge 2: Fullstack -->
    <g transform="translate(80, 0)">
      <rect class="badge-bg" x="0" y="0" width="100" height="26" />
      <text font-family="'Fira Code', monospace" font-size="11" font-weight="500" fill="#8b5cf6" x="14" y="17">Full-Stack</text>
    </g>
    <!-- Badge 3: College/Batch -->
    <g transform="translate(190, 0)">
      <rect class="badge-bg" x="0" y="0" width="135" height="26" />
      <!-- Small graduation cap icon or bullet -->
      <circle cx="15" cy="13" r="3" fill="#f59e0b" />
      <text font-family="'Fira Code', monospace" font-size="11" font-weight="500" fill="#f59e0b" x="25" y="17">KEC (2023-2027)</text>
    </g>
  </g>

  <!-- Cyber Corners for High-End Look -->
  <path d="M 12 30 L 12 12 L 30 12" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <path d="M 818 30 L 818 12 L 800 12" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <path d="M 12 270 L 12 288 L 30 288" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <path d="M 818 270 L 818 288 L 800 288" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
</svg>
