<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 340" width="830" height="340">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02040a" />
      <stop offset="50%" stop-color="#080e1e" />
      <stop offset="100%" stop-color="#04060f" />
    </linearGradient>

    <!-- Glassmorphic Borders -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#8b5cf6" stop-opacity="0.1" />
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="corePillar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.8" />
    </linearGradient>

    <!-- Isometric Plate Gradient -->
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1527" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#1b2a47" stop-opacity="0.6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Shadow for Glass Card -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Text Typing Animations (Clips) -->
    <clipPath id="codeLine1"><rect id="c1" x="50" y="0" width="0" height="340" /></clipPath>
    <clipPath id="codeLine2"><rect id="c2" x="50" y="0" width="0" height="340" /></clipPath>
    <clipPath id="codeLine3"><rect id="c3" x="50" y="0" width="0" height="340" /></clipPath>
    <clipPath id="codeLine4"><rect id="c4" x="50" y="0" width="0" height="340" /></clipPath>
    <clipPath id="codeLine5"><rect id="c5" x="50" y="0" width="0" height="340" /></clipPath>
    <clipPath id="codeLine6"><rect id="c6" x="50" y="0" width="0" height="340" /></clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;family=Outfit:wght@400;600;800&amp;display=swap');

    /* Global Animations */
    .float-panel {
      transform-origin: 220px 170px;
      animation: floatPanel3D 8s ease-in-out infinite;
      filter: url(#cardShadow);
    }
    @keyframes floatPanel3D {
      0% { transform: perspective(1000px) rotateX(4deg) rotateY(-5deg) rotateZ(0.2deg) translateY(0px); }
      50% { transform: perspective(1000px) rotateX(-2deg) rotateY(3deg) rotateZ(-0.2deg) translateY(-5px); }
      100% { transform: perspective(1000px) rotateX(4deg) rotateY(-5deg) rotateZ(0.2deg) translateY(0px); }
    }

    .float-reactor {
      animation: floatReactor 6s ease-in-out infinite;
    }
    @keyframes floatReactor {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* Core Orbiting Animations */
    .rotating-orbit-1 {
      transform-origin: 640px 170px;
      animation: spin3D1 20s linear infinite;
    }
    @keyframes spin3D1 {
      from { transform: rotateX(65deg) rotateY(10deg) rotateZ(0deg); }
      to { transform: rotateX(65deg) rotateY(10deg) rotateZ(360deg); }
    }

    .rotating-orbit-2 {
      transform-origin: 640px 170px;
      animation: spin3D2 14s linear infinite reverse;
    }
    @keyframes spin3D2 {
      from { transform: rotateX(60deg) rotateY(-15deg) rotateZ(0deg); }
      to { transform: rotateX(60deg) rotateY(-15deg) rotateZ(360deg); }
    }

    /* IDE Syntax Coloring */
    .code-font {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      font-weight: 500;
    }
    .keyword { fill: #f92672; }
    .property { fill: #a6e22e; }
    .string { fill: #e6db74; }
    .number { fill: #ae81ff; }
    .comment { fill: #75715e; font-style: italic; }
    .variable { fill: #f8f8f2; }
    .punctuation { fill: #f8f8f2; }

    /* Typing Sequencing */
    #c1 { animation: typeLine 16s infinite steps(20); }
    #c2 { animation: typeLine2 16s infinite steps(35); }
    #c3 { animation: typeLine3 16s infinite steps(40); }
    #c4 { animation: typeLine4 16s infinite steps(30); }
    #c5 { animation: typeLine5 16s infinite steps(35); }
    #c6 { animation: typeLine6 16s infinite steps(10); }

    @keyframes typeLine { 0%, 90% { width: 0; } 1.5%, 85% { width: 350px; } }
    @keyframes typeLine2 { 0%, 5% { width: 0; } 7.5%, 85% { width: 350px; } }
    @keyframes typeLine3 { 0%, 12% { width: 0; } 15%, 85% { width: 350px; } }
    @keyframes typeLine4 { 0%, 20% { width: 0; } 23%, 85% { width: 350px; } }
    @keyframes typeLine5 { 0%, 28% { width: 0; } 31%, 85% { width: 350px; } }
    @keyframes typeLine6 { 0%, 35% { width: 0; } 38%, 85% { width: 350px; } }

    /* Active Pulse Lines */
    .pulse-laser {
      stroke-dasharray: 10, 15;
      animation: laserFlow 3s linear infinite;
    }
    @keyframes laserFlow {
      to { stroke-dashoffset: -50; }
    }

    .header-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 20px;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
  </style>

  <!-- Background Canvas -->
  <rect width="830" height="340" fill="url(#bgGrad)" />

  <!-- Neon Blueprint/Grid Lines (Architectural) -->
  <g opacity="0.05">
    <path d="M 0,40 L 830,40 M 0,80 L 830,80 M 0,120 L 830,120 M 0,160 L 830,160 M 0,200 L 830,200 M 0,240 L 830,240 M 0,280 L 830,280 L 0,320 L 830,320" stroke="#00f2fe" stroke-width="0.8" />
    <path d="M 40,0 L 40,340 M 80,0 L 80,340 M 120,0 L 120,340 M 160,0 L 160,340 M 200,0 L 200,340 M 240,0 L 240,340 M 280,0 L 280,340 M 320,0 L 320,340 M 360,0 L 360,340 M 400,0 L 400,340 M 440,0 L 440,340 M 480,0 L 480,340 M 520,0 L 520,340 M 560,0 L 560,340 M 600,0 L 600,340 M 640,0 L 640,340 M 680,0 L 680,340 M 720,0 L 720,340 M 760,0 L 760,340 M 800,0 L 800,340" stroke="#00f2fe" stroke-width="0.8" />
  </g>

  <!-- Technical Target Decors -->
  <circle cx="640" cy="170" r="150" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,12" opacity="0.15" />
  <circle cx="640" cy="170" r="153" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.1" />
  <path d="M 640,10 L 640,30 M 640,310 L 640,330 M 470,170 L 490,170 M 790,170 L 810,170" stroke="#00f2fe" stroke-width="1.5" opacity="0.2" />

  <!-- Left Side: Interactive Glassmorphic IDE Panel -->
  <g class="float-panel">
    <!-- Neon Drop Shadow behind card -->
    <rect x="35" y="35" width="410" height="260" rx="16" fill="#8b5cf6" opacity="0.08" filter="url(#neonGlow)" />
    <!-- Main Card Body -->
    <rect x="30" y="30" width="410" height="260" rx="16" fill="#050811" fill-opacity="0.85" stroke="url(#glassBorder)" stroke-width="1.5" />
    
    <!-- macOS window controls -->
    <rect x="30" y="30" width="410" height="32" rx="16" fill="#0a0f1d" />
    <circle cx="50" cy="46" r="5.5" fill="#ff5f56" />
    <circle cx="65" cy="46" r="5.5" fill="#ffbd2e" />
    <circle cx="80" cy="46" r="5.5" fill="#27c93f" />
    <!-- File name tab -->
    <path d="M 110,62 L 120,40 L 220,40 L 230,62 Z" fill="#0d1326" stroke="#1e293b" stroke-width="1" />
    <text font-family="'Fira Code', monospace" font-size="10.5" fill="#94a3b8" x="135" y="53">dharwin.json</text>
    <circle cx="210" cy="49" r="3.5" fill="#334155" />

    <!-- Terminal Prompt/Welcome inside the card -->
    <g transform="translate(50, 95)">
      <text class="header-title" x="0" y="0">Dharwin S</text>
      <!-- Subtext -->
      <text font-family="'Outfit', sans-serif" font-weight="600" font-size="11" fill="#00f2fe" x="0" y="16">AI &amp; DATA SCIENCE // FULL STACK BUILDER</text>
    </g>

    <!-- Syntax Highlighted Code Lines -->
    <g class="code-font" transform="translate(50, 140)">
      <!-- Line 1: const developer = { -->
      <g clip-path="url(#codeLine1)">
        <text y="0"><tspan class="keyword">const</tspan> <tspan class="variable">dharwin</tspan> <tspan class="punctuation">=</tspan> <tspan class="punctuation">{</tspan></text>
      </g>
      <!-- Line 2:   focus: "AI & Machine Learning", -->
      <g clip-path="url(#codeLine2)" transform="translate(20, 20)">
        <text y="0"><tspan class="property">focus</tspan><tspan class="punctuation">:</tspan> <tspan class="string">"AI &amp; Machine Learning"</tspan><tspan class="punctuation">,</tspan></text>
      </g>
      <!-- Line 3:   stack: ["React", "FastAPI", "MongoDB"], -->
      <g clip-path="url(#codeLine3)" transform="translate(20, 40)">
        <text y="0"><tspan class="property">stack</tspan><tspan class="punctuation">:</tspan> <tspan class="punctuation">[</tspan><tspan class="string">"React"</tspan><tspan class="punctuation">,</tspan> <tspan class="string">"FastAPI"</tspan><tspan class="punctuation">,</tspan> <tspan class="string">"MongoDB"</tspan><tspan class="punctuation">]</tspan><tspan class="punctuation">,</tspan></text>
      </g>
      <!-- Line 4:   college: "Kongu Engineering", -->
      <g clip-path="url(#codeLine4)" transform="translate(20, 60)">
        <text y="0"><tspan class="property">college</tspan><tspan class="punctuation">:</tspan> <tspan class="string">"KEC (2023-2027)"</tspan><tspan class="punctuation">,</tspan></text>
      </g>
      <!-- Line 5:   cgpa: 8.11, -->
      <g clip-path="url(#codeLine5)" transform="translate(20, 80)">
        <text y="0"><tspan class="property">cgpa</tspan><tspan class="punctuation">:</tspan> <tspan class="number">8.11</tspan><tspan class="punctuation">,</tspan></text>
      </g>
      <!-- Line 6: }; -->
      <g clip-path="url(#codeLine6)">
        <text y="100"><tspan class="punctuation">};</tspan></text>
      </g>
    </g>

    <!-- Interactive Glowing Cursor -->
    <!-- This cursor blinks and moves along with typing lines -->
    <rect x="50" y="244" width="7" height="13" fill="#00f2fe" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite" />
      <animate attributeName="x" values="50;135;290;210;150;70;50" keyTimes="0;0.05;0.2;0.35;0.5;0.65;1" dur="16s" repeatCount="indefinite" />
      <animate attributeName="y" values="128;148;168;188;208;228;128" keyTimes="0;0.05;0.2;0.35;0.5;0.65;1" dur="16s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Right Side: 10x Premium 3D Isometric Sci-Fi Power Core -->
  <g class="float-reactor">
    <!-- Grid Base Ring on Floor -->
    <ellipse cx="640" cy="275" rx="90" ry="28" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="640" cy="275" rx="70" ry="22" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.3" stroke-dasharray="3,6" />

    <!-- Center vertical energy beam (Pillar) -->
    <line x1="640" y1="50" x2="640" y2="280" stroke="url(#corePillar)" stroke-width="6" opacity="0.6" filter="url(#neonGlow)" />
    <line x1="640" y1="50" x2="640" y2="280" stroke="#ffffff" stroke-width="1.5" opacity="0.9" />

    <!-- Rotating orbital shields -->
    <g class="rotating-orbit-1">
      <ellipse cx="640" cy="170" rx="140" ry="46" fill="none" stroke="url(#glassBorder)" stroke-width="1" stroke-dasharray="8,16" opacity="0.5" />
      <!-- Data Packet -->
      <circle cx="500" cy="170" r="5" fill="#00f2fe" filter="url(#neonGlow)" />
    </g>
    <g class="rotating-orbit-2">
      <ellipse cx="640" cy="170" rx="100" ry="32" fill="none" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="20,8" opacity="0.4" />
      <!-- Data Packet -->
      <circle cx="740" cy="170" r="4.5" fill="#8b5cf6" filter="url(#neonGlow)" />
    </g>

    <!-- Stacked 3D Isometric Power Plates (Core) -->
    <!-- PLATE 1 (Bottom Plate) -->
    <g transform="translate(0, 50)">
      <polygon points="560,170 640,140 720,170 640,200" fill="url(#plateGrad)" stroke="#1e293b" stroke-width="1.5" />
      <polygon points="560,170 640,140 720,170 640,200" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6" filter="url(#neonGlow)" />
      <!-- Small details on bottom plate -->
      <circle cx="640" cy="170" r="10" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.8" />
    </g>

    <!-- PLATE 2 (Middle Plate) -->
    <g transform="translate(0, 0)">
      <polygon points="550,170 640,136 730,170 640,204" fill="url(#plateGrad)" stroke="#1e293b" stroke-width="1.5" />
      <polygon points="550,170 640,136 730,170 640,204" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.8" filter="url(#neonGlow)" />
      <!-- Inner glowing ring -->
      <ellipse cx="640" cy="170" rx="35" ry="13" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.8" filter="url(#neonGlow)" />
    </g>

    <!-- PLATE 3 (Top Plate) -->
    <g transform="translate(0, -50)">
      <polygon points="560,170 640,140 720,170 640,200" fill="url(#plateGrad)" stroke="#1e293b" stroke-width="1.5" />
      <polygon points="560,170 640,140 720,170 640,200" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6" filter="url(#neonGlow)" />
      <!-- Central core cylinder glowing -->
      <ellipse cx="640" cy="170" r="12" fill="#00f2fe" opacity="0.8" filter="url(#neonGlow)" />
    </g>

    <!-- Holographic Floating Node Mesh above Plate 3 -->
    <g transform="translate(0, -110)" opacity="0.8">
      <circle cx="640" cy="170" r="10" fill="#00f2fe" filter="url(#neonGlow)" />
      <!-- Connections -->
      <line x1="640" y1="170" x2="590" y2="140" stroke="#00f2fe" stroke-width="1.5" />
      <line x1="640" y1="170" x2="690" y2="140" stroke="#00f2fe" stroke-width="1.5" />
      <line x1="640" y1="170" x2="640" y2="210" stroke="#00f2fe" stroke-width="1.5" />
      
      <!-- Terminating nodes -->
      <circle cx="590" cy="140" r="4" fill="#a855f7" filter="url(#neonGlow)" />
      <circle cx="690" cy="140" r="4" fill="#a855f7" filter="url(#neonGlow)" />
      <circle cx="640" cy="210" r="4.5" fill="#f59e0b" filter="url(#neonGlow)" />
    </g>

    <!-- Side Data Pulsers (Laser pipes) connecting bottom to middle -->
    <path d="M 575,212 L 565,162" stroke="#00f2fe" stroke-width="1.5" fill="none" class="pulse-laser" opacity="0.6" />
    <path d="M 705,212 L 715,162" stroke="#8b5cf6" stroke-width="1.5" fill="none" class="pulse-laser" opacity="0.6" />
  </g>

  <!-- High-End UI Frames and Border Details -->
  <!-- Top Left Frame -->
  <path d="M 12 35 L 12 12 L 35 12" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <text font-family="'Fira Code', monospace" font-size="8.5" fill="#334155" x="42" y="16">LOC.0x47 // SYS.OK</text>

  <!-- Top Right Frame -->
  <path d="M 818 35 L 818 12 L 795 12" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <text font-family="'Fira Code', monospace" font-size="8.5" fill="#334155" x="720" y="16">FRAME.RATE: 60FPS</text>

  <!-- Bottom Left Frame -->
  <path d="M 12 305 L 12 328 L 35 328" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <circle cx="15" cy="325" r="2.5" fill="#334155" />

  <!-- Bottom Right Frame -->
  <path d="M 818 305 L 818 328 L 795 328" fill="none" stroke="#00f2fe" stroke-width="2.5" opacity="0.7" />
  <rect x="790" y="323" width="15" height="1.5" fill="#334155" />
</svg>
