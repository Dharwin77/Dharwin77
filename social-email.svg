<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 40" width="270" height="40">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1e" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#5eebd4" />
    </linearGradient>
  </defs>

  <style>
    .btn-border {
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      animation: pulseBorder 4s infinite alternate;
    }
    .btn-text-main {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 10px;
      font-weight: 800;
      fill: #64748b;
      letter-spacing: 1.5px;
    }
    .btn-text-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 700;
      fill: #3b82f6;
    }
    @keyframes pulseBorder {
      0% { opacity: 0.75; }
      100% { opacity: 1; filter: drop-shadow(0 0 3px rgba(59, 130, 246, 0.4)); }
    }
  </style>

  <!-- Card Body -->
  <rect x="1" y="1" width="268" height="38" rx="8" fill="url(#bgGrad)" class="btn-border" />

  <!-- Logo (Email Envelope Icon) -->
  <g transform="translate(14, 11)" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 3h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" />
    <polyline points="17,5 9,10 1,5" />
  </g>

  <!-- Labels -->
  <text x="38" y="17" class="btn-text-main">EMAIL CONNECTION</text>
  <text x="38" y="29" class="btn-text-sub">dharwinsangamani@gmail.com</text>
</svg>
