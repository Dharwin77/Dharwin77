<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 40" width="170" height="40">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1e" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <style>
    .btn-border {
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      animation: pulseBorder 4s infinite alternate;
    }
    .btn-text-main {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 10px;
      font-weight: 800;
      fill: #64748b;
      letter-spacing: 1.5px;
    }
    .btn-text-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 700;
      fill: #ec4899;
    }
    @keyframes pulseBorder {
      0% { opacity: 0.75; }
      100% { opacity: 1; filter: drop-shadow(0 0 3px rgba(236, 72, 153, 0.4)); }
    }
  </style>

  <!-- Card Body -->
  <rect x="1" y="1" width="168" height="38" rx="8" fill="url(#bgGrad)" class="btn-border" />

  <!-- Logo (GitHub Icon) -->
  <g transform="translate(14, 11)" fill="#ec4899">
    <path d="M9 0C4.03 0 0 4.03 0 9c0 3.97 2.58 7.35 6.16 8.54.45.08.62-.2.62-.43v-1.52c-2.5.54-3.03-1.2-3.03-1.2-.41-1.04-.99-1.32-.99-1.32-.82-.56.06-.55.06-.55.9.06 1.38.93 1.38.93.8 1.38 2.11.98 2.62.75.08-.58.31-.98.56-1.2-2-.23-4.1-1-4.1-4.45 0-.98.35-1.78.92-2.4-.09-.23-.4-1.14.09-2.37 0 0 .76-.24 2.47.92A8.56 8.56 0 0 1 9 4.3c.77.004 1.54.1 2.27.3 1.71-1.16 2.47-.92 2.47-.92.49 1.23.18 2.14.09 2.37.58.62.92 1.42.92 2.4 0 3.46-2.1 4.22-4.11 4.44.32.28.61.82.61 1.66v2.47c0 .24.16.52.62.43A9.01 9.01 0 0 0 18 9c0-4.97-4.03-9-9-9z" />
  </g>

  <!-- Labels -->
  <text x="38" y="17" class="btn-text-main">GITHUB</text>
  <text x="38" y="29" class="btn-text-sub">@Dharwin77</text>
</svg>
