<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 40" width="170" height="40">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1e" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#5eebd4" />
    </linearGradient>
  </defs>

  <style>
    .btn-border {
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      animation: pulseBorder 4s infinite alternate;
    }
    .btn-text-main {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 10px;
      font-weight: 800;
      fill: #64748b;
      letter-spacing: 1.5px;
    }
    .btn-text-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 700;
      fill: #8b5cf6;
    }
    @keyframes pulseBorder {
      0% { opacity: 0.75; }
      100% { opacity: 1; filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.4)); }
    }
  </style>

  <!-- Card Body -->
  <rect x="1" y="1" width="168" height="38" rx="8" fill="url(#bgGrad)" class="btn-border" />

  <!-- Logo (LinkedIn Icon) -->
  <g transform="translate(14, 11)" fill="#8b5cf6">
    <path d="M15.3 0H2.7C1.2 0 0 1.2 0 2.7v12.6C0 16.8 1.2 18 2.7 18h12.6c1.5 0 2.7-1.2 2.7-2.7V2.7C18 1.2 16.8 0 15.3 0zM5.4 15.3H2.7V7.2h2.7v8.1zM4.1 6.1c-0.9 0-1.6-0.7-1.6-1.6c0-0.9 0.7-1.6 1.6-1.6c0.9 0 1.6 0.7 1.6 1.6C5.7 5.4 4.9 6.1 4.1 6.1zM15.3 15.3h-2.7V11c0-1 0-2.3-1.4-2.3c-1.4 0-1.6 1.1-1.6 2.2v4.4H7V7.2h2.6v1.1h0c0.4-0.7 1.3-1.4 2.6-1.4c2.8 0 3.3 1.8 3.3 4.2v4.2z" />
  </g>

  <!-- Labels -->
  <text x="38" y="17" class="btn-text-main">LINKEDIN</text>
  <text x="38" y="29" class="btn-text-sub">dharwin-s</text>
</svg>
