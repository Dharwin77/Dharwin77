<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 40" width="170" height="40">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1e" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eebd4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <style>
    .btn-border {
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      animation: pulseBorder 4s infinite alternate;
    }
    .btn-text-main {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 10px;
      font-weight: 800;
      fill: #64748b;
      letter-spacing: 1.5px;
    }
    .btn-text-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 700;
      fill: #5eebd4;
    }
    @keyframes pulseBorder {
      0% { opacity: 0.75; }
      100% { opacity: 1; filter: drop-shadow(0 0 3px rgba(94, 235, 212, 0.4)); }
    }
  </style>

  <!-- Card Body -->
  <rect x="1" y="1" width="168" height="38" rx="8" fill="url(#bgGrad)" class="btn-border" />

  <!-- Logo (Chrome / Globe Icon) -->
  <g transform="translate(14, 11)" stroke="#5eebd4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="9" r="7.5" />
    <path d="M1 9h16" />
    <path d="M9 1a17.2 17.2 0 0 1 4 8 17.2 17.2 0 0 1-4 8 17.2 17.2 0 0 1-4-8 17.2 17.2 0 0 1 4-8z" />
  </g>

  <!-- Labels -->
  <text x="38" y="17" class="btn-text-main">PORTFOLIO</text>
  <text x="38" y="29" class="btn-text-sub">dharwin.tech</text>
</svg>
