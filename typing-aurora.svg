<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 65" width="600" height="65">
  <defs>
    <!-- Liquid Aurora Background Gradient (Color Shifting) -->
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#091e3a">
        <animate attributeName="stop-color" values="#091e3a;#1e0b36;#06201b;#091e3a" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#1e0b36">
        <animate attributeName="stop-color" values="#1e0b36;#06201b;#091e3a;#1e0b36" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#050811">
        <animate attributeName="stop-color" values="#050811;#0f061e;#030c0a;#050811" dur="12s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glassmorphic Border Gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15" />
    </linearGradient>

    <!-- Radial Nebula Orb Gradient -->
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="30%" stop-color="#00f2fe" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- Shimmer Gradients for Role Texts -->
    <linearGradient id="shimmer1" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#3b82f6" />
      <animate attributeName="x1" values="-100%;100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;200%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="shimmer2" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ec4899" />
      <animate attributeName="x1" values="-100%;100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;200%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="shimmer3" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f43f5e" />
      <animate attributeName="x1" values="-100%;100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;200%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="shimmer4" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#06b6d4" />
      <animate attributeName="x1" values="-100%;100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;200%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Clip Path for Text -->
    <clipPath id="textClip">
      <rect x="140" y="10" width="440" height="45" />
    </clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=Fira+Code:wght@500&amp;display=swap');

    /* Soft Glow Filter */
    .glow-effect {
      filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.45));
    }

    .nebula-orb {
      animation: expandNebula 4s ease-in-out infinite alternate;
      transform-origin: 45px 32.5px;
    }
    @keyframes expandNebula {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    .meta-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      font-weight: 500;
      fill: #94a3b8;
      fill-opacity: 0.65;
      letter-spacing: 1.5px;
    }

    .role-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    /* Aurora Smooth Fade & Slide transitions */
    @keyframes auroraSlide1 {
      0% { opacity: 0; transform: translateY(15px) scale(0.95); }
      3.75% { opacity: 1; transform: translateY(0px) scale(1); }
      21.25% { opacity: 1; transform: translateY(0px) scale(1); }
      25% { opacity: 0; transform: translateY(-15px) scale(1.05); }
      25.01%, 100% { opacity: 0; transform: translateY(15px) scale(0.95); }
    }

    @keyframes auroraSlide2 {
      0%, 25% { opacity: 0; transform: translateY(15px) scale(0.95); }
      28.75% { opacity: 1; transform: translateY(0px) scale(1); }
      46.25% { opacity: 1; transform: translateY(0px) scale(1); }
      50% { opacity: 0; transform: translateY(-15px) scale(1.05); }
      50.01%, 100% { opacity: 0; transform: translateY(15px) scale(0.95); }
    }

    @keyframes auroraSlide3 {
      0%, 50% { opacity: 0; transform: translateY(15px) scale(0.95); }
      53.75% { opacity: 1; transform: translateY(0px) scale(1); }
      71.25% { opacity: 1; transform: translateY(0px) scale(1); }
      75% { opacity: 0; transform: translateY(-15px) scale(1.05); }
      75.01%, 100% { opacity: 0; transform: translateY(15px) scale(0.95); }
    }

    @keyframes auroraSlide4 {
      0%, 75% { opacity: 0; transform: translateY(15px) scale(0.95); }
      78.75% { opacity: 1; transform: translateY(0px) scale(1); }
      96.25% { opacity: 1; transform: translateY(0px) scale(1); }
      100% { opacity: 0; transform: translateY(-15px) scale(1.05); }
    }

    .item1 { animation: auroraSlide1 16s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .item2 { animation: auroraSlide2 16s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .item3 { animation: auroraSlide3 16s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .item4 { animation: auroraSlide4 16s infinite cubic-bezier(0.25, 1, 0.5, 1); }
  </style>

  <!-- Animated Aurora Fluid Background -->
  <rect x="10" y="5" width="580" height="55" rx="14" fill="url(#auroraBg)" />

  <!-- Translucent Glassmorphic Overlay -->
  <rect x="10" y="5" width="580" height="55" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="url(#glassBorder)" stroke-width="1.5" />

  <!-- Glowing Abstract Nebula Icon -->
  <circle cx="45" cy="32.5" r="11" class="nebula-orb" fill="url(#nebula)" />

  <!-- Monospace Label Indicator -->
  <text x="75" y="36.5" class="meta-text">focus:</text>

  <!-- Sliding Roles Container with Clipping -->
  <g clip-path="url(#textClip)">
    <!-- Slide 1 -->
    <g class="item1">
      <text x="140" y="36.5" class="role-title glow-effect" fill="url(#shimmer1)">AI &amp; Data Science Student</text>
    </g>
    <!-- Slide 2 -->
    <g class="item2">
      <text x="140" y="36.5" class="role-title glow-effect" fill="url(#shimmer2)">Full Stack Developer</text>
    </g>
    <!-- Slide 3 -->
    <g class="item3">
      <text x="140" y="36.5" class="role-title glow-effect" fill="url(#shimmer3)">AI/ML Engineer</text>
    </g>
    <!-- Slide 4 -->
    <g class="item4">
      <text x="140" y="36.5" class="role-title glow-effect" fill="url(#shimmer4)">Passionate Tech Explorer</text>
    </g>
  </g>
</svg>
