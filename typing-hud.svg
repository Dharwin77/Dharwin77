<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 65" width="600" height="65">
  <defs>
    <!-- Dark HUD Background Gradient -->
    <linearGradient id="hudBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02080a" />
      <stop offset="100%" stop-color="#051218" />
    </linearGradient>

    <!-- Glowing Cyan HUD Border -->
    <linearGradient id="hudBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#0284c7" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.8" />
    </linearGradient>

    <!-- Scope Circle Pattern -->
    <pattern id="radarGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="15" fill="none" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.05" />
      <line x1="0" y1="15" x2="30" y2="15" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.04" />
      <line x1="15" y1="0" x2="15" y2="30" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.04" />
    </pattern>

    <!-- Radar Sweep Glow Line Gradient -->
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0" />
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </linearGradient>

    <!-- Hologram Glow Filter -->
    <filter id="holoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Fira+Code:wght@400;600&amp;display=swap');

    .hud-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 17px;
      fill: #00f2fe;
      letter-spacing: 1px;
      filter: drop-shadow(0 0 2px rgba(0, 242, 254, 0.4));
    }

    .telemetry-text {
      font-family: 'Fira Code', monospace;
      font-size: 7.5px;
      font-weight: 600;
      fill: #00f2fe;
      fill-opacity: 0.5;
    }

    /* Holographic Glitch/Blink Reveals */
    @keyframes hudReveal1 {
      0% { opacity: 0; transform: scaleY(0) skewX(20deg); filter: blur(2px); }
      1.5% { opacity: 0.5; transform: scaleY(1.2) skewX(-15deg); }
      3% { opacity: 0.2; transform: scaleY(0.8) skewX(10deg); }
      4.5% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      21.25% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      22.5% { opacity: 0.4; transform: scaleY(1.1) skewX(15deg); }
      23.75% { opacity: 0.8; transform: scaleY(0.9) skewX(-10deg); }
      25% { opacity: 0; transform: scaleY(0) skewX(0deg); }
      25.01%, 100% { opacity: 0; }
    }

    @keyframes hudReveal2 {
      0%, 25% { opacity: 0; }
      25% { opacity: 0; transform: scaleY(0) skewX(20deg); filter: blur(2px); }
      26.5% { opacity: 0.5; transform: scaleY(1.2) skewX(-15deg); }
      28% { opacity: 0.2; transform: scaleY(0.8) skewX(10deg); }
      29.5% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      46.25% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      47.5% { opacity: 0.4; transform: scaleY(1.1) skewX(15deg); }
      48.75% { opacity: 0.8; transform: scaleY(0.9) skewX(-10deg); }
      50% { opacity: 0; transform: scaleY(0) skewX(0deg); }
      50.01%, 100% { opacity: 0; }
    }

    @keyframes hudReveal3 {
      0%, 50% { opacity: 0; }
      50% { opacity: 0; transform: scaleY(0) skewX(20deg); filter: blur(2px); }
      51.5% { opacity: 0.5; transform: scaleY(1.2) skewX(-15deg); }
      53% { opacity: 0.2; transform: scaleY(0.8) skewX(10deg); }
      54.5% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      71.25% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      72.5% { opacity: 0.4; transform: scaleY(1.1) skewX(15deg); }
      73.75% { opacity: 0.8; transform: scaleY(0.9) skewX(-10deg); }
      75% { opacity: 0; transform: scaleY(0) skewX(0deg); }
      75.01%, 100% { opacity: 0; }
    }

    @keyframes hudReveal4 {
      0%, 75% { opacity: 0; }
      75% { opacity: 0; transform: scaleY(0) skewX(20deg); filter: blur(2px); }
      76.5% { opacity: 0.5; transform: scaleY(1.2) skewX(-15deg); }
      78% { opacity: 0.2; transform: scaleY(0.8) skewX(10deg); }
      79.5% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      96.25% { opacity: 1; transform: scaleY(1) skewX(0deg); filter: none; }
      97.5% { opacity: 0.4; transform: scaleY(1.1) skewX(15deg); }
      98.75% { opacity: 0.8; transform: scaleY(0.9) skewX(-10deg); }
      100% { opacity: 0; transform: scaleY(0) skewX(0deg); }
    }

    .item1 { animation: hudReveal1 16s infinite; transform-origin: 160px 37px; }
    .item2 { animation: hudReveal2 16s infinite; transform-origin: 160px 37px; }
    .item3 { animation: hudReveal3 16s infinite; transform-origin: 160px 37px; }
    .item4 { animation: hudReveal4 16s infinite; transform-origin: 160px 37px; }
  </style>

  <!-- HUD Card Frame -->
  <rect x="10" y="5" width="580" height="55" rx="4" fill="url(#hudBg)" stroke="url(#hudBorder)" stroke-width="1.25" />

  <!-- Scope grid background -->
  <rect x="10" y="5" width="580" height="55" rx="4" fill="url(#radarGrid)" />

  <!-- Scanning Sweep Line -->
  <rect x="10" y="6" width="35" height="53" fill="url(#sweepGrad)">
    <animate attributeName="x" values="10;545;10" dur="4.5s" repeatCount="indefinite" />
  </rect>

  <!-- Radar Scope circular indicator (rotating crosshair) -->
  <g transform="translate(45, 32.5)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#00f2fe" stroke-width="0.75" stroke-opacity="0.3" stroke-dasharray="3,3" />
    <circle cx="0" cy="0" r="9" fill="none" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.2" />
    <!-- Glowing sweep center dot -->
    <circle cx="0" cy="0" r="1.5" fill="#00f2fe" filter="url(#holoGlow)" />
    <!-- Crosshairs -->
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" />
    </line>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- HUD Diagnostic Subtexts -->
  <!-- Top Corners -->
  <text x="75" y="18" class="telemetry-text">SYS_STATUS: ACTIVE</text>
  <text x="500" y="18" class="telemetry-text" text-anchor="end">SYS_LOC: PORT_77</text>

  <!-- Bottom Corners -->
  <text x="75" y="51" class="telemetry-text">SCAN_FREQ: 2.44GHZ</text>
  <text x="500" y="51" class="telemetry-text" text-anchor="end">SIGNAL: SECURE</text>

  <!-- Monospace Label -->
  <text x="90" y="37.5" class="hud-text" fill-opacity="0.55">&gt; IDENT:</text>

  <!-- Holo-Revealed Role Text Carousel -->
  <!-- Slide 1 -->
  <text x="175" y="37" class="hud-text item1">AI &amp; Data Science Student</text>
  <!-- Slide 2 -->
  <text x="175" y="37" class="hud-text item2">Full Stack Developer</text>
  <!-- Slide 3 -->
  <text x="175" y="37" class="hud-text item3">AI/ML Engineer</text>
  <!-- Slide 4 -->
  <text x="175" y="37" class="hud-text item4">Passionate Tech Explorer</text>
</svg>
