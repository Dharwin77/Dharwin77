<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 65" width="600" height="65">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a16" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#04050b" stop-opacity="0.9" />
    </linearGradient>

    <!-- Glass Border Gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.4" />
    </linearGradient>

    <!-- Glow/Neon Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Slide Text Gradients -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Icon Accent Gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <clipPath id="textClip">
      <rect x="150" y="10" width="430" height="45" />
    </clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&amp;family=Fira+Code:wght@500;600&amp;display=swap');

    /* Float Animation for the Card */
    .card-body {
      animation: floatCard 6s ease-in-out infinite;
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }

    /* Hexagon Icon Pulsing */
    .pulse-icon {
      animation: pulse 3s ease-in-out infinite alternate;
      transform-origin: 45px 32.5px;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.6)); }
    }

    .label-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      font-weight: 600;
      fill: #475569;
      letter-spacing: 2px;
    }

    .slide-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    /* Keyframes for sliding and opacity transition */
    @keyframes slide1 {
      0% { opacity: 0; transform: translateY(25px); }
      3.75% { opacity: 1; transform: translateY(0px); }
      21.25% { opacity: 1; transform: translateY(0px); }
      25% { opacity: 0; transform: translateY(-25px); }
      25.01%, 100% { opacity: 0; transform: translateY(25px); }
    }

    @keyframes slide2 {
      0%, 25% { opacity: 0; transform: translateY(25px); }
      28.75% { opacity: 1; transform: translateY(0px); }
      46.25% { opacity: 1; transform: translateY(0px); }
      50% { opacity: 0; transform: translateY(-25px); }
      50.01%, 100% { opacity: 0; transform: translateY(25px); }
    }

    @keyframes slide3 {
      0%, 50% { opacity: 0; transform: translateY(25px); }
      53.75% { opacity: 1; transform: translateY(0px); }
      71.25% { opacity: 1; transform: translateY(0px); }
      75% { opacity: 0; transform: translateY(-25px); }
      75.01%, 100% { opacity: 0; transform: translateY(25px); }
    }

    @keyframes slide4 {
      0%, 75% { opacity: 0; transform: translateY(25px); }
      78.75% { opacity: 1; transform: translateY(0px); }
      96.25% { opacity: 1; transform: translateY(0px); }
      100% { opacity: 0; transform: translateY(-25px); }
    }

    .item1 { animation: slide1 16s infinite ease-in-out; }
    .item2 { animation: slide2 16s infinite ease-in-out; }
    .item3 { animation: slide3 16s infinite ease-in-out; }
    .item4 { animation: slide4 16s infinite ease-in-out; }
  </style>

  <g class="card-body">
    <!-- Main Window Background -->
    <rect x="10" y="5" width="580" height="55" rx="12" fill="url(#cardBgGrad)" stroke="url(#glassBorder)" stroke-width="1.5" />

    <!-- Hexagon Tech Icon -->
    <g class="pulse-icon">
      <polygon points="45,20 56,26 56,39 45,45 34,39 34,26" fill="none" stroke="url(#iconGrad)" stroke-width="2" />
      <circle cx="45" cy="32.5" r="3" fill="#ffffff" filter="url(#glow)" />
    </g>

    <!-- Prompt Label -->
    <text x="80" y="36.5" class="label-text">ROLE &gt;</text>

    <!-- Sliding Text Wrapper with Clip Path -->
    <g clip-path="url(#textClip)">
      <!-- Slide 1 -->
      <g class="item1">
        <text x="150" y="36.5" class="slide-text" fill="url(#grad1)">AI &amp; Data Science Student</text>
      </g>
      <!-- Slide 2 -->
      <g class="item2">
        <text x="150" y="36.5" class="slide-text" fill="url(#grad2)">Full Stack Developer</text>
      </g>
      <!-- Slide 3 -->
      <g class="item3">
        <text x="150" y="36.5" class="slide-text" fill="url(#grad3)">AI/ML Engineer</text>
      </g>
      <!-- Slide 4 -->
      <g class="item4">
        <text x="150" y="36.5" class="slide-text" fill="url(#grad4)">Passionate Tech Explorer</text>
      </g>
    </g>
  </g>
</svg>
