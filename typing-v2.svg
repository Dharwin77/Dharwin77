<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 65" width="600" height="65">
  <defs>
    <!-- Background Dark Gradient -->
    <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030308" />
      <stop offset="100%" stop-color="#0a0a16" />
    </linearGradient>

    <!-- Neon Cyberpunk Border Gradient -->
    <linearGradient id="cyberBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00a0" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="cyberGrid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#ff00a0" stroke-width="0.75" stroke-opacity="0.08" />
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#00f2fe" stroke-width="0.75" stroke-opacity="0.05" />
    </pattern>

    <!-- Scanline Overlay Pattern -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <rect width="100" height="2" fill="#000000" fill-opacity="0.35" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');

    .cyber-card {
      animation: shiftCard 8s ease-in-out infinite alternate;
    }
    @keyframes shiftCard {
      0% { transform: translate(0, 0); }
      100% { transform: translate(1px, -1px); }
    }

    .tag-label {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      font-weight: 700;
      fill: #ff00a0;
      letter-spacing: 1.5px;
      filter: drop-shadow(0px 0px 3px rgba(255, 0, 160, 0.6));
    }

    .cyber-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 1.5px;
    }

    /* Cyber Glitch Animation Definitions */
    @keyframes glitch1 {
      0% { opacity: 0; transform: skew(0deg); fill: #00f2fe; filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.8)); }
      1.5% { opacity: 1; transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #00f2fe); }
      3% { opacity: 0.8; transform: skew(-10deg); fill: #00f2fe; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #00f2fe); }
      4.5% { opacity: 1; transform: skew(0deg); fill: #00f2fe; filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.5)); }
      
      10% { transform: skew(0deg); fill: #00f2fe; filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.5)); }
      10.5% { transform: skew(-20deg) scaleY(0.9); fill: #ff00a0; filter: drop-shadow(-3px 0 0 #ff00a0) drop-shadow(3px 0 0 #00f2fe); }
      11% { transform: skew(0deg); fill: #00f2fe; filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.5)); }

      18% { transform: skew(0deg); fill: #00f2fe; filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.5)); }
      18.5% { transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #00f2fe); }
      19% { transform: skew(0deg); fill: #00f2fe; filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.5)); }

      21% { opacity: 1; transform: skew(0deg); fill: #00f2fe; }
      22% { opacity: 0.7; transform: skew(10deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #00f2fe); }
      23.5% { opacity: 0.2; transform: skew(-15deg); fill: #00f2fe; filter: drop-shadow(3px 0 0 #ff00a0) drop-shadow(-3px 0 0 #00f2fe); }
      24.5% { opacity: 0.9; transform: skew(0deg); fill: #ff00a0; }
      24.9% { opacity: 0; }
      25%, 100% { opacity: 0; }
    }

    @keyframes glitch2 {
      0%, 25% { opacity: 0; }
      25% { opacity: 0; transform: skew(0deg); fill: #8b5cf6; filter: drop-shadow(0 0 5px rgba(139, 92, 246, 0.8)); }
      26.5% { opacity: 1; transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #8b5cf6); }
      28% { opacity: 0.8; transform: skew(-10deg); fill: #8b5cf6; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #8b5cf6); }
      29.5% { opacity: 1; transform: skew(0deg); fill: #8b5cf6; filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.5)); }

      35% { transform: skew(0deg); fill: #8b5cf6; filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.5)); }
      35.5% { transform: skew(-20deg) scaleY(0.9); fill: #ff00a0; filter: drop-shadow(-3px 0 0 #ff00a0) drop-shadow(3px 0 0 #8b5cf6); }
      36% { transform: skew(0deg); fill: #8b5cf6; filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.5)); }

      43% { transform: skew(0deg); fill: #8b5cf6; filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.5)); }
      43.5% { transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #8b5cf6); }
      44% { transform: skew(0deg); fill: #8b5cf6; filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.5)); }

      46% { opacity: 1; transform: skew(0deg); fill: #8b5cf6; }
      47% { opacity: 0.7; transform: skew(10deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #8b5cf6); }
      48.5% { opacity: 0.2; transform: skew(-15deg); fill: #8b5cf6; filter: drop-shadow(3px 0 0 #ff00a0) drop-shadow(-3px 0 0 #8b5cf6); }
      49.5% { opacity: 0.9; transform: skew(0deg); fill: #ff00a0; }
      49.9% { opacity: 0; }
      50%, 100% { opacity: 0; }
    }

    @keyframes glitch3 {
      0%, 50% { opacity: 0; }
      50% { opacity: 0; transform: skew(0deg); fill: #ffb800; filter: drop-shadow(0 0 5px rgba(255, 184, 0, 0.8)); }
      51.5% { opacity: 1; transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #ffb800); }
      53% { opacity: 0.8; transform: skew(-10deg); fill: #ffb800; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #ffb800); }
      54.5% { opacity: 1; transform: skew(0deg); fill: #ffb800; filter: drop-shadow(0 0 3px rgba(255, 184, 0, 0.5)); }

      60% { transform: skew(0deg); fill: #ffb800; filter: drop-shadow(0 0 3px rgba(255, 184, 0, 0.5)); }
      60.5% { transform: skew(-20deg) scaleY(0.9); fill: #ff00a0; filter: drop-shadow(-3px 0 0 #ff00a0) drop-shadow(3px 0 0 #ffb800); }
      61% { transform: skew(0deg); fill: #ffb800; filter: drop-shadow(0 0 3px rgba(255, 184, 0, 0.5)); }

      68% { transform: skew(0deg); fill: #ffb800; filter: drop-shadow(0 0 3px rgba(255, 184, 0, 0.5)); }
      68.5% { transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #ffb800); }
      69% { transform: skew(0deg); fill: #ffb800; filter: drop-shadow(0 0 3px rgba(255, 184, 0, 0.5)); }

      71% { opacity: 1; transform: skew(0deg); fill: #ffb800; }
      72% { opacity: 0.7; transform: skew(10deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #ffb800); }
      73.5% { opacity: 0.2; transform: skew(-15deg); fill: #ffb800; filter: drop-shadow(3px 0 0 #ff00a0) drop-shadow(-3px 0 0 #ffb800); }
      74.5% { opacity: 0.9; transform: skew(0deg); fill: #ff00a0; }
      74.9% { opacity: 0; }
      75%, 100% { opacity: 0; }
    }

    @keyframes glitch4 {
      0%, 75% { opacity: 0; }
      75% { opacity: 0; transform: skew(0deg); fill: #00ff66; filter: drop-shadow(0 0 5px rgba(0, 255, 102, 0.8)); }
      76.5% { opacity: 1; transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #00ff66); }
      78% { opacity: 0.8; transform: skew(-10deg); fill: #00ff66; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #00ff66); }
      79.5% { opacity: 1; transform: skew(0deg); fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); }

      85% { transform: skew(0deg); fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); }
      85.5% { transform: skew(-20deg) scaleY(0.9); fill: #ff00a0; filter: drop-shadow(-3px 0 0 #ff00a0) drop-shadow(3px 0 0 #00ff66); }
      86% { transform: skew(0deg); fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); }

      93% { transform: skew(0deg); fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); }
      93.5% { transform: skew(15deg); fill: #ff00a0; filter: drop-shadow(2px 0 0 #ff00a0) drop-shadow(-2px 0 0 #00ff66); }
      94% { transform: skew(0deg); fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); }

      96% { opacity: 1; transform: skew(0deg); fill: #00ff66; }
      97% { opacity: 0.7; transform: skew(10deg); fill: #ff00a0; filter: drop-shadow(-2px 0 0 #ff00a0) drop-shadow(2px 0 0 #00ff66); }
      98.5% { opacity: 0.2; transform: skew(-15deg); fill: #00ff66; filter: drop-shadow(3px 0 0 #ff00a0) drop-shadow(-3px 0 0 #00ff66); }
      99.5% { opacity: 0.9; transform: skew(0deg); fill: #ff00a0; }
      100% { opacity: 0; }
    }

    .item1 { animation: glitch1 16s infinite; }
    .item2 { animation: glitch2 16s infinite; }
    .item3 { animation: glitch3 16s infinite; }
    .item4 { animation: glitch4 16s infinite; }
  </style>

  <g class="cyber-card">
    <!-- Main Window Background -->
    <rect x="10" y="5" width="580" height="55" rx="8" fill="url(#cyberBg)" stroke="url(#cyberBorder)" stroke-width="1.5" />

    <!-- Grid lines -->
    <rect x="10" y="5" width="580" height="55" rx="8" fill="url(#cyberGrid)" />

    <!-- Scanline overlays -->
    <rect x="10" y="5" width="580" height="55" rx="8" fill="url(#scanlines)" />

    <!-- Digital Telemetry Decorator -->
    <text x="35" y="36.5" class="tag-label">[ SYS_RUN ]</text>

    <!-- Role Titles -->
    <!-- Slide 1 -->
    <text x="175" y="37" class="cyber-text item1">AI &amp; DATA SCIENCE STUDENT</text>
    <!-- Slide 2 -->
    <text x="175" y="37" class="cyber-text item2">FULL STACK DEVELOPER</text>
    <!-- Slide 3 -->
    <text x="175" y="37" class="cyber-text item3">AI/ML ENGINEER</text>
    <!-- Slide 4 -->
    <text x="175" y="37" class="cyber-text item4">PASSIONATE TECH EXPLORER</text>
  </g>
</svg>
