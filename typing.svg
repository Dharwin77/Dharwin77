<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 65" width="600" height="65">
  <defs>
    <!-- Clip paths for typing effect -->
    <clipPath id="clip1">
      <rect id="rect1" x="250" y="0" width="0" height="65" />
    </clipPath>
    <clipPath id="clip2">
      <rect id="rect2" x="250" y="0" width="0" height="65" />
    </clipPath>
    <clipPath id="clip3">
      <rect id="rect3" x="250" y="0" width="0" height="65" />
    </clipPath>
    <clipPath id="clip4">
      <rect id="rect4" x="250" y="0" width="0" height="65" />
    </clipPath>

    <!-- Glass border gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d1ff24" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;display=swap');

    /* 3D Float and Tilt Animation */
    .terminal-body {
      transform-origin: 300px 30px;
      animation: float3D 6s ease-in-out infinite;
    }

    @keyframes float3D {
      0% { transform: perspective(800px) rotateX(10deg) rotateY(-8deg) rotateZ(0.5deg) translateY(0px); }
      50% { transform: perspective(800px) rotateX(6deg) rotateY(-4deg) rotateZ(-0.5deg) translateY(-4px); }
      100% { transform: perspective(800px) rotateX(10deg) rotateY(-8deg) rotateZ(0.5deg) translateY(0px); }
    }

    .terminal-text {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 14px;
      fill: #f1f5f9;
    }

    .prompt {
      fill: #d1ff24;
      font-weight: 600;
    }

    .command {
      fill: #e2e8f0;
    }

    .typed-text {
      font-weight: 600;
    }

    .cursor {
      fill: #ff0055;
      animation: blink 0.8s infinite;
    }

    /* Keyframes for Clip Widths (Typing) */
    @keyframes type1 {
      0%, 100% { width: 0; }
      1.5%, 22% { width: 250px; }
      23.5%, 25% { width: 0; }
    }

    @keyframes type2 {
      0%, 25%, 100% { width: 0; }
      26.5%, 47% { width: 200px; }
      48.5%, 50% { width: 0; }
    }

    @keyframes type3 {
      0%, 50%, 100% { width: 0; }
      51.5%, 72% { width: 175px; }
      73.5%, 75% { width: 0; }
    }

    @keyframes type4 {
      0%, 75%, 100% { width: 0; }
      76.5%, 97% { width: 240px; }
      98.5%, 99.9% { width: 0; }
    }

    /* Opacity cycle for each text group */
    @keyframes opacity1 {
      0%, 25% { opacity: 1; }
      25.01%, 100% { opacity: 0; }
    }
    @keyframes opacity2 {
      0%, 25.01% { opacity: 0; }
      25.02%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
    @keyframes opacity3 {
      0%, 50.01% { opacity: 0; }
      50.02%, 75% { opacity: 1; }
      75.01%, 100% { opacity: 0; }
    }
    @keyframes opacity4 {
      0%, 75.01% { opacity: 0; }
      75.02%, 100% { opacity: 1; }
    }

    /* Cursor X movement mapping to typing widths */
    @keyframes cursorMove {
      0% { transform: translateX(0px); }
      1.5%, 22% { transform: translateX(250px); }
      23.5%, 25% { transform: translateX(0px); }

      26.5%, 47% { transform: translateX(200px); }
      48.5%, 50% { transform: translateX(0px); }

      51.5%, 72% { transform: translateX(175px); }
      73.5%, 75% { transform: translateX(0px); }

      76.5%, 97% { transform: translateX(240px); }
      98.5%, 100% { transform: translateX(0px); }
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    #rect1 { animation: type1 16s infinite steps(27); }
    #rect2 { animation: type2 16s infinite steps(22); }
    #rect3 { animation: type3 16s infinite steps(19); }
    #rect4 { animation: type4 16s infinite steps(26); }

    .group1 { animation: opacity1 16s infinite; }
    .group2 { animation: opacity2 16s infinite; }
    .group3 { animation: opacity3 16s infinite; }
    .group4 { animation: opacity4 16s infinite; }

    .cursor-wrapper {
      animation: cursorMove 16s infinite;
    }
  </style>

  <!-- Shadow Glow Base (3D Depth) -->
  <rect x="25" y="15" width="550" height="36" rx="8" fill="#ff0055" opacity="0.1" filter="url(#neonGlow)" />

  <!-- 3D Floating Terminal Body -->
  <g class="terminal-body">
    <!-- Main Window Background -->
    <rect x="20" y="10" width="560" height="38" rx="8" fill="#050508" fill-opacity="0.9" stroke="url(#glassBorder)" stroke-width="1.5" />

    <!-- Terminal Window Controls (left side) -->
    <circle cx="40" cy="29" r="4.5" fill="#ff0055" />
    <circle cx="53" cy="29" r="4.5" fill="#d1ff24" />
    <circle cx="66" cy="29" r="4.5" fill="#8a8a93" />

    <!-- Prompt & Static Command -->
    <text x="85" y="34" class="terminal-text prompt">dharwin@kec:~$</text>
    <text x="210" y="34" class="terminal-text command">echo</text>

    <!-- Text 1: "AI &amp; Data Science Student" -->
    <g class="group1">
      <text x="250" y="34" class="terminal-text typed-text" fill="#ff0055" clip-path="url(#clip1)">&quot;AI &amp; Data Science Student&quot;</text>
    </g>

    <!-- Text 2: "Full Stack Developer" -->
    <g class="group2">
      <text x="250" y="34" class="terminal-text typed-text" fill="#d1ff24" clip-path="url(#clip2)">&quot;Full Stack Developer&quot;</text>
    </g>

    <!-- Text 3: "AI/ML Enthusiast" -->
    <g class="group3">
      <text x="250" y="34" class="terminal-text typed-text" fill="#ff0055" clip-path="url(#clip3)">&quot;AI/ML Enthusiast&quot;</text>
    </g>

    <!-- Text 4: "Passionate Tech Explorer" -->
    <g class="group4">
      <text x="250" y="34" class="terminal-text typed-text" fill="#d1ff24" clip-path="url(#clip4)">&quot;Passionate Tech Explorer&quot;</text>
    </g>

    <!-- Blinking Cursor -->
    <g class="cursor-wrapper" transform="translate(250, 0)">
      <rect x="2" y="19" width="8" height="18" class="cursor" />
    </g>
  </g>
</svg>
