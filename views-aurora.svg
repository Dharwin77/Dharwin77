<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" width="280" height="50">
  <defs>
    <!-- Liquid Aurora Background Gradient (Color Shifting) -->
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#091e3a">
        <animate attributeName="stop-color" values="#091e3a;#1e0b36;#06201b;#091e3a" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#1e0b36">
        <animate attributeName="stop-color" values="#1e0b36;#06201b;#091e3a;#1e0b36" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#050811">
        <animate attributeName="stop-color" values="#050811;#0f061e;#030c0a;#050811" dur="12s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glassmorphic Border Gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2" />
    </linearGradient>

    <!-- Radial Nebula Orb Gradient -->
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="30%" stop-color="#00f2fe" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- Text Shimmer Gradient -->
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a855f7" />
      <animate attributeName="x1" values="-100%;100%" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;200%" dur="5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=Fira+Code:wght@500&amp;display=swap');

    .card {
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .card:hover {
      transform: scale(1.02);
    }

    .nebula-orb {
      animation: expandNebula 4s ease-in-out infinite alternate;
      transform-origin: 22px 25px;
    }

    .label-main {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 11.5px;
      letter-spacing: 0.5px;
      fill: url(#shimmer);
      filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.3));
    }

    .label-meta {
      font-family: 'Fira Code', monospace;
      font-size: 8px;
      font-weight: 500;
      fill: #94a3b8;
      fill-opacity: 0.7;
      letter-spacing: 1px;
    }

    @keyframes expandNebula {
      0% { transform: scale(0.9); opacity: 0.75; }
      100% { transform: scale(1.15); opacity: 1; }
    }
  </style>

  <g class="card">
    <!-- Fluid Aurora Card Body -->
    <rect x="5" y="5" width="270" height="40" rx="10" fill="url(#auroraBg)" />
    
    <!-- Glassmorphic Translucent Overlay -->
    <rect x="5" y="5" width="270" height="40" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="url(#glassBorder)" stroke-width="1.25" />

    <!-- Glowing Nebula Icon -->
    <circle cx="22" cy="25" r="7" class="nebula-orb" fill="url(#nebula)" />

    <!-- Meta indicator -->
    <text x="39" y="24" class="label-meta">traffic:</text>

    <!-- Main Label -->
    <text x="39" y="36" class="label-main">Profile Views</text>

    <!-- Nested View Count Badge -->
    <g transform="translate(170, 16)">
      <!-- Soft glass frame around the badge -->
      <rect x="-2" y="-2" width="92" height="22" rx="4" fill="none" stroke="#ffffff" stroke-width="0.75" stroke-opacity="0.15" />
      <image href="https://komarev.com/ghpvc/?username=Dharwin77&amp;color=8b5cf6&amp;style=flat-square&amp;label=VIEWS&amp;label_color=091e3a" x="0" y="0" width="88" height="18" />
    </g>
  </g>
</svg>
