<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" width="280" height="50">
  <defs>
    <!-- Background Dark Gradient -->
    <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030308" />
      <stop offset="100%" stop-color="#090915" />
    </linearGradient>

    <!-- Neon Cyberpunk Border Gradient -->
    <linearGradient id="cyberBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00a0">
        <animate attributeName="stop-color" values="#ff00a0;#00f2fe;#ff00a0" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#ff00a0;#00f2fe" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Scanline Pattern -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <rect width="100" height="1.5" fill="#000000" fill-opacity="0.4" />
    </pattern>

    <!-- Micro Grid -->
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#ff00a0" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');

    .card {
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .card:hover {
      transform: scale(1.02);
    }

    .label-main {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 2px;
      fill: #ff00a0;
      filter: drop-shadow(0px 0px 3px rgba(255, 0, 160, 0.6));
      animation: neonPulse 2s ease-in-out infinite alternate;
    }

    .label-sub {
      font-family: 'Fira Code', monospace;
      font-weight: 700;
      font-size: 8px;
      fill: #00f2fe;
      letter-spacing: 1px;
      fill-opacity: 0.8;
    }

    .cyber-chevron {
      fill: #ff00a0;
      animation: blinkChevron 1.5s infinite steps(2);
    }

    .status-dot {
      fill: #00ff66;
      animation: blinkDot 1s infinite alternate;
      filter: drop-shadow(0px 0px 4px rgba(0, 255, 102, 0.8));
    }

    @keyframes neonPulse {
      0% { fill: #ff00a0; filter: drop-shadow(0px 0px 2px rgba(255, 0, 160, 0.4)); }
      100% { fill: #ff33b5; filter: drop-shadow(0px 0px 5px rgba(255, 0, 160, 0.8)); }
    }

    @keyframes blinkChevron {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes blinkDot {
      0% { fill-opacity: 0.4; }
      100% { fill-opacity: 1; }
    }
  </style>

  <g class="card">
    <!-- Main Card Body -->
    <rect x="5" y="5" width="270" height="40" rx="6" fill="url(#cyberBg)" stroke="url(#cyberBorder)" stroke-width="1.25" />
    
    <!-- Pattern Overlays -->
    <rect x="5" y="5" width="270" height="40" rx="6" fill="url(#grid)" />
    <rect x="5" y="5" width="270" height="40" rx="6" fill="url(#scanlines)" />

    <!-- Status indicator green dot -->
    <circle cx="20" cy="25" r="3.5" class="status-dot" />

    <!-- Cyber terminal decorative chevrons -->
    <text x="32" y="28" class="cyber-chevron label-sub">&gt;&gt;</text>

    <!-- Main Label -->
    <text x="52" y="28" class="label-main">ACCESS LOGS</text>

    <!-- Sub Diagnostics -->
    <text x="52" y="38" class="label-sub">PORT: 77 // SYS_OK</text>

    <!-- Nested View Count Badge -->
    <g transform="translate(170, 15)">
      <!-- Cyber theme view badge decoration -->
      <rect x="-3" y="-3" width="94" height="24" rx="2" fill="none" stroke="#00f2fe" stroke-width="0.75" stroke-opacity="0.5" />
      <image href="https://komarev.com/ghpvc/?username=Dharwin77&amp;color=5eebd4&amp;style=flat-square&amp;label=VIEWS&amp;label_color=080e1e" x="0" y="0" width="88" height="18" />
    </g>
  </g>
</svg>
